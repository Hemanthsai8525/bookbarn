# Server port (Railway sets PORT automatically)
server.port=${PORT:8080}

# MySQL datasource (Railway provides these via environment variables)
spring.datasource.url=${MYSQL_URL:jdbc:mysql://localhost:3306/bookstore?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${MYSQL_USER:root}
spring.datasource.password=${MYSQL_PASSWORD:root}

# Hibernate / JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# File upload
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB
file.upload-dir=uploads

# JWT secret (IMPORTANT: Set this as environment variable in Railway)
app.jwt.secret=${JWT_SECRET:nLkPvZ3CJMb2pZVZ6oWRqF2u3Tt0tV8J5c71v0Z5XgA=}

# Email Configuration (Gmail SMTP - SSL)
# IMPORTANT: Set EMAIL_USERNAME and EMAIL_PASSWORD as environment variables in Railway
spring.mail.host=smtp.gmail.com
spring.mail.port=465
spring.mail.username=${EMAIL_USERNAME:your-email@gmail.com}
spring.mail.password=${EMAIL_PASSWORD:your-app-password}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.ssl.enable=true
spring.mail.properties.mail.smtp.ssl.trust=smtp.gmail.com
spring.mail.properties.mail.smtp.socketFactory.port=465
spring.mail.properties.mail.smtp.socketFactory.class=javax.net.ssl.SSLSocketFactory
spring.mail.properties.mail.smtp.socketFactory.fallback=false

